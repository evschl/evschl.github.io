<!DOCTYPE html>
    <html lang = "en-US">

        <head>  
            <meta charset = "utf-8">
            <link href = "styles/default.css" type = "text/css" rel = "stylesheet">
            <script src="scripts/calculator_try.js"></script>
            <title>Calculator Using Tutorial</title>
        </head>

        <body>
            
            <div data-include="components/header.html"></div> 

            <main>
                <span style="text-align:center">
                    <h2>
                        🦎 Calculator Try 🦎
                    </h2>
                </span>
                
                <button type="button" onclick=addNum(0)>0</button>
                <button type="button" onclick=addNum(1)>1</button>
                <button type="button" onclick=addNum(2)>2</button>
                <button type="button" onclick=addNum(3)>3</button>
                <button type="button" onclick=addNum(4)>4</button>
                <button type="button" onclick=addNum(5)>5</button>
                <button type="button" onclick=addNum(6)>6</button>
                <button type="button" onclick=addNum(7)>7</button>
                <button type="button" onclick=addNum(8)>8</button>
                <button type="button" onclick=addNum(9)>9</button>
                <br>
                <button type="button" onclick=operation(1)>+</button>
                <button type="button" onclick=operation(2)>-</button>
                <button type="button" onclick=operation(3)>X</button>
                <button type="button" onclick=operation(4)>/</button>
                <br>
                <button type="button" onclick=operation(5)>=</button>

                <p id="toDisplay"></p>

            </main>

            <script src="scripts/htmlinclude.js"></script>
            <div data-include="components/footer.html"></div>
        </body>

    </html>
