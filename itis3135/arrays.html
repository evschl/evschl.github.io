<!DOCTYPE html>
    <html lang = "en-US">

        <head>  
            <meta charset = "utf-8">
            <link href = "styles/default.css" type = "text/css" rel = "stylesheet">
            <script src="scripts/arrays.js"></script>
            <title>Arrays</title>
        </head>

        <body>
            
            <div data-include="components/header.html"></div> 

            <main>
                <span style="text-align:center">
                    <h2>
                        🦎 Arrays 🦎
                    </h2>
                </span>

                Add a New Employee:
                <br>
                Name:
                <input type="text" id="newName" placeholder="New Employee Name">
                <br>
                Salary:
                <input type="number" id="newSalary" name="newSalary" min="1" max="10000000">
                <br>
                <button type="button" id="addSalary" onclick="addSalary()">Add Employee/Salary</button>
                <br>
                Newest Employee: <p id="newest_employee"></p>
                Newest Employee's Salary: <p id="newest_salary"></p>
                <br>

                <button type="button" id="displayResults" onclick="displayResults()">Display Avg/Sum of Salaries</button>
                <br>
                Sum: <p id="display_sum"></p>
                Avg: <p id="display_avg"></p>
                <br>

                <button type="button" id="displaySalary" onclick="displaySalary()">Display Table</button>
                <br>
                Employee Table:
                <div class="table_div">
                    <table class="centered-table" id="employee_table">
                        <thead>
                            <tr>Name: </tr>
                            <tr>Salary: </tr>
                        </thead>
                        <tbody id="display_results"></tbody>
                    </table>
                </div>

            </main>

            <div data-include="components/footer.html"></div>
            <script src="scripts/htmlinclude.js"></script>
        </body>

    </html>
